function readFileAsText(file){
  const n=file.name.toLowerCase();
  if(n.endsWith('.xlsx')||n.endsWith('.xls')||n.endsWith('.xlsm')){
    return new Promise((res,rej)=>{ const r=new FileReader();
      r.onload=e=>{ try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
        if(!wb.SheetNames.length){rej(new Error(`'${file.name}'에 시트가 없습니다.`));return;}
        let ws=wb.Sheets[wb.SheetNames[0]],best=0;
        wb.SheetNames.forEach(nm=>{const s=wb.Sheets[nm],ref=s['!ref'];if(!ref)return;
          const rg=XLSX.utils.decode_range(ref);const c=(rg.e.r-rg.s.r+1)*(rg.e.c-rg.s.c+1);if(c>best){best=c;ws=s;}});
        // ★ PM2.5 .w(표시문자열) 깨짐 회피 → 원시값(raw)으로 CSV 생성
        const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,blankrows:true,defval:''});
        const csv=aoa.map(row=>row.map(cell=>{
          if(cell===null||cell===undefined||cell==='')return '';
          if(cell instanceof Date)return fmtDate(cell);
          let s=String(cell); if(/[",\n]/.test(s))s='"'+s.replace(/"/g,'""')+'"'; return s;
        }).join(',')).join('\n');
        res(csv);
      }catch(err){rej(new Error(`'${file.name}' 엑셀 파싱 오류: ${err.message}`));} };
      r.onerror=()=>rej(new Error(`'${file.name}' 읽기 실패`)); r.readAsArrayBuffer(file); });
  }
  return new Promise((res,rej)=>{ const r=new FileReader();
    r.onload=e=>{ const buf=e.target.result; if(!buf){res('');return;}
      const u=new Uint8Array(buf); let text='';
      try{ text=new TextDecoder('utf-8',{fatal:true}).decode(u); }catch(_){ text=new TextDecoder('euc-kr').decode(u); }
      res(text); };
    r.onerror=()=>rej(new Error(`'${file.name}' 읽기 실패`)); r.readAsArrayBuffer(file); });
}

function parseCsvWithQuotes(csv){
  const rows=[]; let cur=[],f='',q=false;
  if(csv.charCodeAt(0)===0xFEFF)csv=csv.slice(1);
  csv=csv.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for(let i=0;i<csv.length;i++){const c=csv[i];
    if(q){if(c==='"'){if(i+1<csv.length&&csv[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}
    else{if(c==='"')q=true;else if(c===','){cur.push(f);f='';}else if(c==='\n'){cur.push(f);rows.push(cur);cur=[];f='';}else f+=c;}}
  cur.push(f);rows.push(cur);
  return rows.filter(r=>r.length>1||(r.length===1&&r[0].trim()!==''));
}
function findStationCoords(name){
  if(stationCoordinates[name])return stationCoordinates[name];
  const norm=name.replace(/\s/g,'');
  const k=Object.keys(stationCoordinates).find(key=>key.replace(/\s/g,'')===norm);
  if(k)return stationCoordinates[k];
  if(name.length>1){const sk=Object.keys(stationCoordinates).find(key=>key.includes(name));if(sk)return stationCoordinates[sk];}
  return null;
}

function calcMetricsPM25(st){

  const last12=valid.slice(-Math.min(12,valid.length));const s12=last12.reduce((a,c)=>a+c.value,0);

    if(st.metrics.latest_1hr_avg!==undefined&&v2!==null)st.metrics.delta_2hr=parseFloat((st.metrics.latest_1hr_avg-v2).toFixed(2));}
  if(st.metrics.full_period_max!==undefined){const mt=[...valid].reverse().find(t=>t.value===st.metrics.full_period_max);st.metrics.max_value_timestamp=mt?mt.timestamp:null;}
  let lr=0,cr=0,lv=-Infinity;for(const t of valid){if(t.value!==null&&t.value===lv)cr++;else{lr=Math.max(lr,cr);cr=1;lv=t.value;}}

function calcOzoneScores(st){

  st.metrics.full_period_max=maxVal;st.metrics.latest_value=current.value||0;st.metrics.latest_1hr_avg=l1;
  st.metrics.ozone_exceed_count=exceed;st.metrics.total_valid_count=count;
  const comp={
    'U1_val':`${u1.toFixed(1)}점 (최신: ${current.value}ppm)`,
    'U2_val':`${u2.toFixed(1)}점 (1시간평균: ${l1.toFixed(3)}ppm)`,
    'S_val':`${sS.toFixed(1)}점 (최대: ${maxVal}ppm)`,
    'P_val':`${pS.toFixed(1)}점 (초과빈도: ${(exceed/count*100).toFixed(1)}%)`,
    '최신 농도':`${current.value}ppm`,'최대 농도':`${maxVal}ppm`
  };
  return {u1:+u1.toFixed(1),u2:+u2.toFixed(1),u:+(u1+u2).toFixed(1),s:+sS.toFixed(1),p:+pS.toFixed(1),d:0,d1:0,d2:0,total:+(u1+u2+sS+pS).toFixed(1),components:comp};
}
function haversine(la1,lo1,la2,lo2){const R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

function analyzeData(contents, selectedNames, pollutant){
  const raw=contents.flatMap(c=>parseCsv(c,pollutant));
  if(raw.length===0)throw new Error('제공된 파일에서 유효한 측정소 데이터를 찾을 수 없습니다.');
  const map=new Map();
  raw.forEach(s=>{if(map.has(s.name))map.get(s.name).timeseries.push(...s.timeseries);else map.set(s.name,s);});
  map.forEach(s=>s.timeseries.sort((a,b)=>a.timestamp.localeCompare(b.timestamp)));
  const uniq=Array.from(map.values());uniq.forEach((s,i)=>s.id=i);
  const totalValid=uniq.reduce((n,s)=>n+s.timeseries.filter(t=>t.value!==null).length,0);
  if(totalValid===0)throw new Error(`데이터 파싱 실패: ${pollutant} 의 유효한 측정값을 찾을 수 없습니다. (파싱된 측정소 ${uniq.length}개)`);
  const selected=industrialComplexes.filter(c=>selectedNames.includes(c.name));
  const analyzed=[];
  selected.forEach(complex=>{let closest=null,minD=Infinity,coord=null;
    uniq.forEach(st=>{const sc=findStationCoords(st.name);if(sc){const d=haversine(complex.lat,complex.lon,sc.lat,sc.lon);if(d<minD){minD=d;closest=st;coord=sc;}}});
    if(closest){
      if(!closest.scores){ if(pollutant==='O3'){preprocessOzoneData(closest);closest.scores=calcOzoneScores(closest);}
        else{calcMetricsPM25(closest);closest.scores=calcPM25Scores(closest);} }
      const cp=JSON.parse(JSON.stringify(closest));
      if(pollutant==='PM2.5'){const {max_score,max_distance_km}=scoringCriteria.D2;const prox=Math.max(0,max_score*(1-minD/max_distance_km));
        cp.scores.d2=+prox.toFixed(1);const {u1=0,u2=0,s1=0,s2=0,p1=0,d1=0,d2=0}=cp.scores;
        cp.scores.total=+Math.max(0,u1+u2+s1+s2+p1+d1+d2).toFixed(1);
        cp.scores.components['근접성 점수']=`${cp.scores.d2}점 (${minD.toFixed(1)}km)`;}
      else{let dS=Math.max(0,ozoneCriteria.D.base_score-(minD*ozoneCriteria.D.penalty_per_km));cp.scores.d=+dS.toFixed(1);
        const {u1=0,u2=0,s=0,p=0}=cp.scores;cp.scores.total=+(u1+u2+s+p+dS).toFixed(1);
        cp.scores.components['D_val']=`${dS.toFixed(1)}점 (${minD.toFixed(1)}km)`;}
      analyzed.push({complex,station:cp,distanceKm:minD,stationCoord:coord});}});
  if(analyzed.length===0){const ex=uniq.map(s=>s.name).slice(0,5).join(', ');
    throw new Error(`선택한 산업단지와 매칭되는 측정소를 찾을 수 없습니다.\n파싱된 측정소 예: ${ex}`);}
  const ranked=analyzed.sort((a,b)=>b.station.scores.total-a.station.scores.total);
  const ts=uniq.flatMap(s=>s.timeseries).map(t=>t.timestamp).filter(Boolean).sort((a,b)=>a.localeCompare(b));
  return {pollutantType:pollutant,rankedComplexes:ranked,startTimestamp:ts[0]||'N/A',endTimestamp:ts[ts.length-1]||'N/A',totalStationsParsed:uniq.length,totalComplexesAnalyzed:ranked.length};
}

    renderReport();
    $('#btnAnalyze').classList.add('hidden');$('#btnReset').classList.remove('hidden');
    $('#results').scrollIntoView({behavior:'smooth'});
  }catch(e){errBox.textContent=e.message;errBox.classList.remove('hidden');}
  finally{btn.disabled=false;btn.textContent=`${STATE.pollutant} 우선순위 분석 실행`;}

      <h3 class="text-xl font-bold mb-3">상세 분석 (상위 ${Math.min(10,rows.length)}개)</h3>
      <div id="detailCards" class="space-y-5"></div>
    </div>
  </div>`;

  // 상세 카드 (상위 10)
  const dc=$('#detailCards',box);
  rows.slice(0,10).forEach((c,i)=>dc.appendChild(detailCard(c,i,isO3)));
  // 행 클릭 → 해당 상세로 스크롤
  $$('#results tbody tr').forEach(tr=>tr.addEventListener('click',()=>{const rk=+tr.dataset.rank;const t=$('#detail-'+rk);if(t)t.scrollIntoView({behavior:'smooth',block:'center'});}));
  // 지도 초기화
  setTimeout(()=>rows.slice(0,10).forEach((c,i)=>initMap('map-'+i,c)),60);
  // 상세 분석 보고서 팝업
  const bFR=$('#btnFullReport',box); if(bFR) bFR.addEventListener('click',openReportModal);
}

function detailCard(c,i,isO3,prefix=''){
  const s=c.station.scores,m=c.station.metrics,comp=s.components||{};
  const card=el('div','bg-white border rounded-lg p-5 shadow-sm');card.id=prefix+'detail-'+i;
  const conc=isO3
    ? `<div class="grid grid-cols-3 gap-2 text-sm bg-gray-50 rounded-md p-3">
         <div>최신 농도: <b>${fmtV(m.latest_value)} ppm</b></div>
         <div>최고 농도: <b>${fmtV(m.full_period_max)} ppm</b></div>
         <div>초과 건수: <b>${m.ozone_exceed_count??0}회</b></div></div>`
    : `<div class="grid grid-cols-3 gap-2 text-sm bg-gray-50 rounded-md p-3">
         <div>최신 1시간: <b>${fmtV(m.latest_1hr_avg)} ㎍/㎥</b></div>
         <div>최고 농도: <b>${fmtV(m.full_period_max)} ㎍/㎥</b></div>
         <div>기간 평균: <b>${fmtV(m.full_period_avg)} ㎍/㎥</b></div></div>`;
  const breakdown=isO3
    ? [['U1 (최신)',comp.U1_val],['U2 (평균)',comp.U2_val],['S (심각성)',comp.S_val],['P (지속성)',comp.P_val],['D (신뢰성)',comp.D_val]]
    : [['U1 (최신 1시간)',`${s.u1}점 (${comp['최신 1시간 농도']||''})`],
       ['U2 (2시간 변화)',`${s.u2}점 (${comp['2시간 농도 변화']||''})`],
       ['S1 (기간 최대)',`${s.s1}점 (${comp['기간 최대 농도']||''})`],
       ['S2 (최대 최근성)',`${s.s2}점 (${comp['최대농도 최근성']||''})`],
       ['P1 (기간 평균)',`${s.p1}점 (${comp['기간 평균 농도']||''})`],
       ['D1 (품질)',`${s.d1}점`],['D2 (근접성)',comp['근접성 점수']||`${s.d2}점`]];
  const bdHtml=breakdown.map(([k,v])=>`<div class="flex justify-between border-b border-gray-100 py-1"><span class="text-gray-500">${k}</span><span class="font-medium text-right">${esc(v||'-')}</span></div>`).join('');
  card.innerHTML=`
    <h4 class="text-lg font-bold border-b pb-2 mb-3">${i+1}. ${esc(c.complex.name)}</h4>
    <p class="text-sm text-gray-600 mb-3">순위: ${i+1}위 &nbsp;|&nbsp; 총점: <b class="text-brand-blue">${s.total.toFixed(1)}점</b> &nbsp;|&nbsp; 근거 측정소: ${esc(c.station.name)} (${c.distanceKm.toFixed(1)}km)</p>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <div class="space-y-3">
        <div><p class="font-semibold text-sm mb-1">주요 농도 지표</p>${conc}</div>
        <div><p class="font-semibold text-sm mb-1">세부 점수 내역 (${isO3?'오존':'미세먼지'})</p><div class="text-sm">${bdHtml}</div></div>
      </div>
      <div>
        <p class="font-semibold text-sm mb-1">위치 확인</p>
        <div id="${prefix}map-${i}" style="height:260px" class="border"></div>
        <div class="mt-2 text-xs text-gray-600 space-y-1">
          <div><span class="inline-block w-3 h-3 rounded-full align-middle" style="background:#D32F2F"></span> ${esc(c.complex.name)} — ${esc(c.complex.address||'')}</div>
          <div><span class="inline-block w-3 h-3 rounded-full align-middle" style="background:#1976D2"></span> ${esc(c.station.name)} 측정소 — ${esc(c.stationCoord?.address||'')}</div>
        </div>
      </div>
    </div>`;
  return card;
}

function initMap(id,c){
  const cont=document.getElementById(id);if(!cont||!window.L||!c.stationCoord)return;
  try{
    const a=[c.complex.lat,c.complex.lon],b=[c.stationCoord.lat,c.stationCoord.lon];
    const map=L.map(id,{scrollWheelZoom:false});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
    L.circleMarker(a,{radius:9,color:'#B71C1C',fillColor:'#D32F2F',fillOpacity:.9,weight:2}).addTo(map).bindPopup(esc(c.complex.name));
    L.circleMarker(b,{radius:9,color:'#0D47A1',fillColor:'#1976D2',fillOpacity:.9,weight:2}).addTo(map).bindPopup(esc(c.station.name)+' 측정소');
    L.polyline([a,b],{color:'#7C4DFF',weight:2,dashArray:'6 6'}).addTo(map);
    map.fitBounds([a,b],{padding:[40,40],maxZoom:14});
    setTimeout(()=>{try{map.invalidateSize();map.fitBounds([a,b],{padding:[40,40],maxZoom:14});}catch(_){}} ,150);
  }catch(e){cont.innerHTML='<p class="text-xs text-gray-400 p-2">지도를 불러올 수 없습니다.</p>';}
}

/* ---------- 평가 기준 텍스트 ---------- */
function criteriaHtml(isO3){
  if(isO3){const o=ozoneCriteria;
    return `<ul class="list-disc pl-5 space-y-1">
      <li><b>U1 시급성</b>: ${esc(o.U1.description)}</li>
      <li><b>U2 시급성</b>: ${esc(o.U2.description)}</li>
      <li><b>S 심각성</b>: ${esc(o.S.description)}</li>
      <li><b>P 지속성</b>: ${esc(o.P.description)}</li>
      <li><b>D 신뢰성</b>: ${esc(o.D.description)}</li>
    </ul>`;}
  const c=scoringCriteria;
  return `<ul class="list-disc pl-5 space-y-1">
    <li><b>U1 시급성</b>: 최신 1시간 농도 × 0.5 (최대 ${c.U1.max_score}점)</li>
    <li><b>U2 시급성</b>: 2시간 농도 변화 기반 (최대 ${c.U2.max_score}점)</li>
    <li><b>S1 심각성</b>: 기간 최대 농도 × 0.2 (최대 ${c.S1.max_score}점)</li>
    <li><b>S2 심각성</b>: 최대농도 발생 최근성 (최대 ${c.S2.max_score}점)</li>
    <li><b>P1 지속성</b>: 기간 평균 농도 기반 (최대 ${c.P1.max_score}점)</li>
    <li><b>D1 신뢰성</b>: 이상값(≥${c.D1.anomaly_threshold}) ${c.D1.penalty_anomaly}점 / 장기 동일값(≥${c.D1.constant_run_threshold}회) ${c.D1.penalty_constant}점</li>
    <li><b>D2 신뢰성</b>: 측정소 근접성 (최대 ${c.D2.max_score}점, ${c.D2.max_distance_km}km 기준)</li>
  </ul>`;
}

/* ---------- 모달 ---------- */
function modalShell(title,inner){
  const root=$('#modalRoot');
  root.innerHTML=`<div class="fixed inset-0 bg-black bg-opacity-60 z-50 flex justify-center items-center p-4 fade-in">
    <div class="bg-white rounded-lg shadow-2xl w-full max-w-4xl p-6 relative max-h-[90vh] overflow-y-auto">
      <button id="mClose" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-3xl leading-none">&times;</button>
      <h3 class="text-xl font-bold mb-4 flex items-center gap-2">${title}</h3>
      ${inner}
      <div class="mt-6 flex justify-end"><button id="mClose2" class="px-6 py-2 bg-gray-200 rounded-md hover:bg-gray-300 font-medium">닫기</button></div>
    </div></div>`;
  const close=()=>root.innerHTML='';
  $('#mClose',root).addEventListener('click',close);$('#mClose2',root).addEventListener('click',close);
  root.firstElementChild.addEventListener('click',e=>{if(e.target===root.firstElementChild)close();});
}
function openCriteriaModal(){modalShell(`📋 ${STATE.pollutant} 우선관리 대상 선정 평가 기준`,`<div class="text-sm text-gray-700">${criteriaHtml(STATE.pollutant==='O3')}</div>`);}
function openInfoModal(){
  const complexes=industrialComplexes.map(c=>`
    <div class="border rounded-lg p-3 text-sm">
      <p class="font-bold">${esc(c.name)}</p>
      <p class="text-gray-500 text-xs mt-1">주소: ${esc(c.address||'-')}</p>
      <p class="text-gray-500 text-xs">위도: ${c.lat} / 경도: ${c.lon}</p>
    </div>`).join('');
  const stations=Object.entries(stationCoordinates).map(([k,v])=>`
    <div class="border rounded-lg p-3 text-sm">
      <p class="font-bold">${esc(k)}</p>
      <p class="text-gray-500 text-xs mt-1">${esc(v.address||'')}</p>
      <p class="text-gray-500 text-xs">위도: ${v.lat} / 경도: ${v.lon}</p>
    </div>`).join('');
  modalShell('📍 위치 정보 안내',`
    <div class="flex gap-2 border-b mb-4">
      <button id="tabC" class="tabBtn px-4 py-2 font-medium border-b-2 border-brand-blue text-brand-blue">🏭 산업단지 목록 (${industrialComplexes.length})</button>
      <button id="tabS" class="tabBtn px-4 py-2 font-medium border-b-2 border-transparent text-gray-500">📡 대기 측정망 목록 (${Object.keys(stationCoordinates).length})</button>
    </div>
    <div id="paneC" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">${complexes}</div>
    <div id="paneS" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">${stations}</div>`);
  const root=$('#modalRoot');
  const setTab=which=>{
    $('#paneC',root).classList.toggle('hidden',which!=='C');$('#paneS',root).classList.toggle('hidden',which!=='S');
    $('#tabC',root).className='tabBtn px-4 py-2 font-medium border-b-2 '+(which==='C'?'border-brand-blue text-brand-blue':'border-transparent text-gray-500');
    $('#tabS',root).className='tabBtn px-4 py-2 font-medium border-b-2 '+(which==='S'?'border-brand-blue text-brand-blue':'border-transparent text-gray-500');};
  $('#tabC',root).addEventListener('click',()=>setTab('C'));$('#tabS',root).addEventListener('click',()=>setTab('S'));
}

/* ---------- 상세 분석 보고서 팝업 ---------- */
function openReportModal(){
  const r=STATE.result;if(!r)return;const isO3=r.pollutantType==='O3';const rows=r.rankedComplexes;
  const top5=rows.slice(0,5).map((c,i)=>{const s=c.station.scores,m=c.station.metrics;
    const recent=isO3?m.latest_value:m.latest_1hr_avg,high=m.full_period_max;
    const U=isO3?s.u:(s.u1+s.u2),S=isO3?s.s:(s.s1+s.s2),P=isO3?s.p:s.p1,D=isO3?s.d:(s.d1+s.d2);
    return `<tr class="border-t">
      <td class="px-3 py-3 text-center">${i+1}</td>
      <td class="px-3 py-3 font-semibold whitespace-nowrap">${esc(c.complex.name)}</td>
      <td class="px-3 py-3 whitespace-nowrap text-gray-600">${esc(c.station.name)}</td>
      <td class="px-3 py-3 text-right tabular-nums">${fmtV(recent)}</td>
      <td class="px-3 py-3 text-right tabular-nums">${fmtV(high)}</td>
      <td class="px-3 py-3 text-right font-bold text-brand-blue tabular-nums">${s.total.toFixed(1)}</td>
      <td class="px-3 py-3 text-right tabular-nums">${U.toFixed(1)}</td>
      <td class="px-3 py-3 text-right tabular-nums">${S.toFixed(1)}</td>
      <td class="px-3 py-3 text-right tabular-nums">${P.toFixed(1)}</td>
      <td class="px-3 py-3 text-right tabular-nums text-green-700">${D.toFixed(1)}</td>
    </tr>`;}).join('');
  const root=$('#modalRoot');
  root.innerHTML=`<div class="fixed inset-0 bg-black bg-opacity-60 z-50 flex justify-center items-start p-4 overflow-y-auto fade-in">
    <div class="bg-white rounded-lg shadow-2xl w-full max-w-6xl my-6 p-6 relative">
      <button id="rClose" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-3xl leading-none">&times;</button>
      <h3 class="text-2xl font-bold text-brand-blue">분석 보고서 (${r.pollutantType})</h3>
      <p class="text-sm text-gray-500 mb-5">분석 기간: ${esc(r.startTimestamp)} ~ ${esc(r.endTimestamp)}</p>
      <h4 class="text-lg font-bold mb-2">종합 순위 (상위 ${Math.min(5,rows.length)}개)</h4>
      <div class="overflow-x-auto border rounded-lg mb-8">
        <table class="min-w-full text-sm">
          <thead class="bg-gray-50 text-gray-600"><tr>
            <th class="px-3 py-2">순위</th><th class="px-3 py-2 text-left">산업단지명</th>
            <th class="px-3 py-2 text-left">근거 측정소</th>
            <th class="px-3 py-2 text-right">최근농도</th><th class="px-3 py-2 text-right">최고농도</th>
            <th class="px-3 py-2 text-right">총점</th>
            <th class="px-3 py-2 text-right">시급성(U)</th><th class="px-3 py-2 text-right">심각성(S)</th>
            <th class="px-3 py-2 text-right">지속성(P)</th><th class="px-3 py-2 text-right">신뢰성(D)</th>
          </tr></thead><tbody>${top5}</tbody>
        </table>
      </div>
      <h4 class="text-lg font-bold mb-3">상세 분석 (상위 ${Math.min(10,rows.length)}개)</h4>
      <div id="rDetailCards" class="space-y-5"></div>
      <div class="mt-6 flex justify-end"><button id="rClose2" class="px-6 py-2 bg-gray-200 rounded-md hover:bg-gray-300 font-medium">닫기</button></div>
    </div></div>`;
  const dc=$('#rDetailCards',root);
  rows.slice(0,10).forEach((c,i)=>dc.appendChild(detailCard(c,i,isO3,'r')));
  const close=()=>root.innerHTML='';
  $('#rClose',root).addEventListener('click',close);$('#rClose2',root).addEventListener('click',close);
  root.firstElementChild.addEventListener('click',e=>{if(e.target===root.firstElementChild)close();});
  setTimeout(()=>rows.slice(0,10).forEach((c,i)=>initMap('rmap-'+i,c)),90);
}

render();

</script>
</body>
</html>
